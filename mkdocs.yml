site_name: velocit.ee docs
site_url: https://docs.velocit.ee/
site_description: Open-core infrastructure deployment platform — engine reference, architecture, and runbooks.
site_author: velocit.ee
copyright: "© velocit.ee — open source under AGPL v3"
repo_url: https://github.com/velocit-ee/core
repo_name: velocit-ee/core
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
strict: true
use_directory_urls: true

# Match the landing-page palette (terminal aesthetic — dark green / brown / cream).
# Material gives us a structured way to do this without inline CSS leaking.
theme:
  name: material
  language: en
  favicon: assets/favicon.svg
  logo: assets/logo.svg
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: dark)"
      scheme: velocitee-dark
      toggle:
        icon: material/brightness-2
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: velocitee-light
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow

extra_css:
  - assets/velocitee.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/velocit-ee
      name: velocit-ee on GitHub
    - icon: fontawesome/solid/globe
      link: https://velocit.ee
      name: velocit.ee
  generator: false

plugins:
  - search
  - tags

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  # Required so :material-foo: / :octicons-bar: render as icons rather than
  # literal text. Without these the home-page card grid looks like raw
  # markdown soup.
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - What is velocitee?: what-is-velocitee.md
  - Getting started: getting-started.md
  - Engines:
      - VME — metal:
          - Overview: vme/index.md
          - Getting started: vme/getting-started.md
          - Compatibility: vme/compatibility.md
      - VNE — network:
          - Overview: vne/index.md
          - Getting started: vne/getting-started.md
          - Provisioner backends: vne/provisioners.md
          - Configuration reference: vne/configuration.md
      - VSE — services (planned): vse.md
      - VLE — lifecycle (planned): vle.md
  - Architecture:
      - Pipeline: architecture/pipeline.md
      - Handoff manifest: architecture/manifest.md
      - Renderer model: architecture/renderers.md
  - Reference:
      - velocitee.yml: reference/velocitee-yml.md
      - Environment variables: reference/environment.md
  - Contributing:
      - Overview: contributing/index.md
      - Code of conduct: contributing/code-of-conduct.md
      - Releasing: contributing/releasing.md
  - Changelog: changelog.md
  - Commercial license: commercial-license.md
