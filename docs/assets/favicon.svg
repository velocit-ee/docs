  <rect x="3" y="3" width="26" height="26" rx="2" fill="none" stroke="#2a2a35" stroke-width="1"/>
  <text x="6" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="14" font-weight="600" fill="#60a5fa">v</text>
  <rect x="14" y="11" width="4" height="12" fill="#4ade80"/>
  <text x="20" y="22" font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="14" font-weight="600" fill="#e8eaf0">e</text>
</svg>
