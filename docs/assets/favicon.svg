<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="velocit.ee">
  <!-- Terminal block + green caret. Matches the landing page's blinking cursor. -->
  <rect width="32" height="32" rx="4" fill="#0b0e09"/>
  <rect x="3" y="3" width="26" height="26" rx="2" fill="none" stroke="#232d1f" stroke-width="1"/>
  <text x="6" y="22" font-family="ui-monospace, 'IBM Plex Mono', monospace"
        font-size="14" font-weight="600" fill="#d4ccb4">v</text>
  <rect x="14" y="11" width="4" height="12" fill="#7dc48a"/>
  <text x="20" y="22" font-family="ui-monospace, 'IBM Plex Mono', monospace"
        font-size="14" font-weight="600" fill="#c4a06a">e</text>
</svg>
